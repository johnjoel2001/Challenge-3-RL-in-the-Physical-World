[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["python", "node"]
buildCmd = "pip install -r requirements.txt && cd react-demo && npm install && npm run build"

[deploy]
startCommand = "python3 backend/server.py"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
